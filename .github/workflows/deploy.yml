name: Deploy to InfinityFree

on:
  push:
    branches: [ "main" ]

jobs:
  ftp-deploy:
    name: 🚀 Deploy via FTP
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4
      
      - name: 🔍 Debug FTP Connection
        run: |
          echo "Testing FTP connection..."
          echo "Server: ftpupload.net"
          echo "Username: if0_41411582"
          echo "Password length: ${{ secrets.INFINITYFREE_FTP_PASSWORD != '' && '✓ Set' || '✗ Not set' }}"
      
      - name: 📤 FTP Upload
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ftpupload.net
          username: if0_41411582
          password: ${{ secrets.INFINITYFREE_FTP_PASSWORD }}
          server-dir: /htdocs/
          local-dir: ./
          dangerous-clean-slate: true
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            README.md
            **/config.local.php
            **/negoit.sql
            **/.DS_Store
            **/info.php
            **/test_db.php